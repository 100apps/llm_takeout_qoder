// Data view
let currentDataTab = 'merchants';

function refreshData() {
  const tabs = ['merchants', 'products', 'users', 'riders', 'orders', 'promotions', 'config'];
  const tabsContainer = document.getElementById('data-tabs');
  
  tabsContainer.innerHTML = tabs.map(t => `
    <button class="data-tab ${t === currentDataTab ? 'active' : ''}" onclick="showDataTab('${t}')">${t}</button>
  `).join('');
  
  showDataTab(currentDataTab);
}

function showDataTab(tab) {
  currentDataTab = tab;
  document.querySelectorAll('.data-tab').forEach(t => t.classList.toggle('active', t.textContent === tab));
  
  let data;
  if (tab === 'config') {
    data = [LocalStore._read('config')];
  } else if (tab === 'products') {
    data = [];
    for (const m of LocalStore.all('merchants')) {
      for (const p of (m.menu || [])) {
        data.push({
          id: p.id,
          name: p.name,
          price: p.price,
          category: p.category,
          merchant_id: m.id,
          merchant_name: m.name,
          merchant_category: m.category
        });
      }
    }
  } else {
    data = LocalStore.all(tab);
  }
  
  document.getElementById('data-count').textContent = `共 ${data.length} 条记录`;
  
  const thead = document.getElementById('data-thead');
  const tbody = document.getElementById('data-tbody');
  
  if (data.length === 0) {
    thead.innerHTML = '';
    tbody.innerHTML = '<tr><td>暂无数据</td></tr>';
    return;
  }
  
  // Get columns (limited for readability)
  let columns = Object.keys(data[0]);
  if (tab === 'merchants') columns = ['id', 'name', 'category', 'emoji', 'address'];
  if (tab === 'products') columns = ['id', 'name', 'price', 'category', 'merchant_id', 'merchant_name', 'merchant_category'];
  if (tab === 'users') columns = ['id', 'name', 'address', 'balance', 'order_count'];
  if (tab === 'riders') columns = ['id', 'name', 'status', 'stats'];
  if (tab === 'orders') columns = ['id', 'user_id', 'merchant_id', 'status', 'total_price', 'final_price'];
  if (tab === 'promotions') columns = ['id', 'title', 'type', 'status', 'budget_used', 'usage_count'];
  
  thead.innerHTML = `<tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr>`;
  
  const displayLimit = tab === 'products' ? 100 : 50;
  tbody.innerHTML = data.slice(0, displayLimit).map(row => `
    <tr>${columns.map(c => {
      let val = row[c];
      if (typeof val === 'object') val = JSON.stringify(val).slice(0, 50) + '...';
      return `<td>${val ?? ''}</td>`;
    }).join('')}</tr>
  `).join('');
}

function resetData() {
  if (!confirm('确定要重置所有数据吗？此操作不可恢复。')) return;
  LocalStore.clearAll();
  initializeData();

function exportData() {
  const data = {
    merchants: LocalStore.all('merchants'),

    orders: LocalStore.all('orders'),

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

  const a = document.createElement('a');
  a.href = url;

  a.click();
  URL.revokeObjectURL(url);

    cancel_order:          () => { const o = findOrder('CREATED'); return { order_id: o?.id || 'ORD-NOTFOUND', reason: '测试取消' }; },
    get_order:             () => { const o = LocalStore.all('orders')[0]; return { order_id: o?.id || 'ORD-NOTFOUND' }; },
    list_orders:           { user_id: 'user_001' },
    accept_order:          () => { const o = findOrder('PAID'); return { order_id: o?.id || 'ORD-NOTFOUND' }; },
    reject_order:          () => { const o = findOrder('PAID'); return { order_id: o?.id || 'ORD-NOTFOUND', reason: '库存不足' }; },
    set_merchant_subsidy:  { merchant_id: 'merchant_001', config: { enabled: true, goal: 'attract_new', max_subsidy_rate: 0.2, daily_budget: 500 } },
    list_available_riders: {},
    calculate_dispatch:    () => { const o = findOrder('ACCEPTED'); return { order_id: o?.id || 'ORD-NOTFOUND' }; },
    dispatch_order:        () => { const o = findOrder('ACCEPTED'); const r = findRider(); return { order_id: o?.id || 'ORD-NOTFOUND', rider_id: r?.id || 'rider_001' }; },
    batch_dispatch:        () => { const orders = LocalStore.all('orders').filter(o => o.status === 'ACCEPTED').slice(0, 2); return { order_ids: orders.map(o => o.id) }; },
    start_delivery:        () => { const o = findOrder('DISPATCHED'); return { order_id: o?.id || 'ORD-NOTFOUND' }; },
    complete_delivery:     () => { const o = findOrder('DELIVERING'); return { order_id: o?.id || 'ORD-NOTFOUND' }; },
    get_config:            {},
    update_config:         { goal: 'balanced', strategies: ['fair_dispatch'] },
    set_platform_subsidy:  { config: { enabled: true, goal: 'gmv_growth', budget_per_order: 10 } },
    get_platform_stats:    {},
    update_order:          () => { const o = LocalStore.all('orders')[0]; return { order_id: o?.id || 'ORD-NOTFOUND', fields: { delivery_fee: 5 } }; },
    get_subsidy_context:   { merchant_ids: ['merchant_001', 'merchant_002'] },
    set_product_subsidies: { subsidies: [{ product_id: 'prod_001_001', merchant_id: 'merchant_001', merchant_subsidy: 3, platform_subsidy: 2, sort_score: 90, reason: 'demo test' }] },
    create_promotion:      { title: '工具测试活动', description: '这是工具测试创建的活动', type: 'bonus_credit', rules: { total_budget: 100, per_user_amount: 5, target_users: 'all', max_uses_per_user: 1 }, reward: { type: 'credit', amount: 5 } },
    list_promotions:       {},
    apply_promotion:       () => { const promos = LocalStore.all('promotions').filter(p => p.status === 'active'); return { promotion_id: promos[0]?.id || 'promo_NOTFOUND', user_id: 'user_010' }; }
  };

  const entry = demoMap[toolName];
  if (!entry) return {};
  return typeof entry === 'function' ? entry() : entry;
}

function renderToolsList() {
  const container = document.getElementById('tool-categories');
  if (!container) return;

  // Build tool schema lookup
  const schemaMap = {};
  for (const s of TOOL_SCHEMAS) {
    schemaMap[s.function.name] = s.function;
  }

  let html = '';
  for (const [role, tools] of Object.entries(ROLE_TOOLS)) {
    const display = ROLE_DISPLAY[role] || { name: role, emoji: '🔧' };
    html += `<div class="tool-category" data-role="${role}">`;
    html += `<div class="tool-category-header">${display.emoji} ${display.name} <span class="tool-count">${tools.length}个</span></div>`;
    html += `<div class="tool-category-grid">`;

    for (const toolName of tools) {
      const schema = schemaMap[toolName];
      const desc = schema?.description || '';
      const params = schema?.parameters?.properties || {};
      const required = schema?.parameters?.required || [];
      const paramNames = Object.keys(params);

      html += `<div class="tool-card" onclick="testTool('${toolName}')" title="点击测试">`;
      html += `<div class="tool-name">${toolName}</div>`;
      html += `<div class="tool-desc">${desc}</div>`;
      if (paramNames.length > 0) {
        html += `<div class="tool-params">`;
        for (const pn of paramNames) {
          const isReq = required.includes(pn);
          html += `<span class="tool-param-tag ${isReq ? 'required' : ''}">${pn}${isReq ? '*' : ''}</span>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function testTool(toolName) {
  const output = document.getElementById('tool-result-output');
  const fn = TOOL_FUNCTIONS[toolName];
  if (!fn) {
    output.innerHTML = `<span class="tool-result-err">工具 ${toolName} 不存在</span>`;
    return;
  }

  // Highlight active card
  document.querySelectorAll('.tool-card.active').forEach(c => c.classList.remove('active'));
  const cards = document.querySelectorAll('.tool-card');
  cards.forEach(c => { if (c.querySelector('.tool-name')?.textContent === toolName) c.classList.add('active'); });

  const args = getToolDemoArgs(toolName);

  let result;
  const startTime = performance.now();
  try {
    // Route through execTool pattern for consistent argument handling
    const agent = { toolNames: Object.keys(TOOL_FUNCTIONS), execTool: BaseAgent.prototype.execTool };
    agent.toolNames = Object.keys(TOOL_FUNCTIONS);
    result = BaseAgent.prototype.execTool.call(agent, toolName, args);
  } catch (e) {
    result = { error: `执行异常: ${e.message}` };
  }
  const elapsed = (performance.now() - startTime).toFixed(1);

  const isError = !!result?.error;
  const resultJson = JSON.stringify(result, null, 2);

  output.innerHTML =
    `<span class="tool-result-header">🔧 ${toolName}</span>` +
    `<span class="tool-result-args">参数: ${JSON.stringify(args, null, 2)}</span>` +
    `<span style="color:var(--text-secondary);font-size:11px;">耗时: ${elapsed}ms</span>\n\n` +
    `<span class="${isError ? 'tool-result-err' : 'tool-result-ok'}">${resultJson}</span>`;

  output.scrollTop = 0;
}

// Initialize on load
document.addEventListener('DOMContentLoaded', initUI);
</script>
